<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Personas Desaparecidas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Sistema de Personas Desaparecidas</h1>

    <h2>Registro de Persona</h2>

    <input type="text" id="nombre" placeholder="Nombre Completo">
    <br><br>

    <input type="number" id="edad" placeholder="Edad">
    <br><br>

    <input type="text" id="sexo" placeholder="Sexo">
    <br><br>

    <input type="text" id="estatura" placeholder="Estatura">
    <br><br>

    <input type="text" id="peso" placeholder="Peso">
    <br><br>

    <input type="text" id="ojos" placeholder="Color de Ojos">
    <br><br>

    <input type="text" id="cabello" placeholder="Color de Cabello">
    <br><br>

    <input type="text" id="senas" placeholder="Señas Particulares">
    <br><br>

    <input type="text" id="vestimenta" placeholder="Vestimenta">
    <br><br>

    <input type="date" id="fecha">
    <br><br>

    <input type="text" id="lugar" placeholder="Lugar de Desaparición">
    <br><br>

    <input type="text" id="telefono" placeholder="Teléfono">
    <br><br>

    <label>Fotografía:</label>
    <input type="file" id="foto">
    <br><br>

    <button onclick="registrar()">Registrar</button>

    <hr>

    <h2>Buscar Persona</h2>

    <input type="text" id="buscarNombre" placeholder="Buscar por nombre">

    <button>Buscar</button>

    <hr>

    <h2>Personas Registradas</h2>

    <div id="registros">

    </div>

    <script src="script.js"></script>

</body>

</html>
